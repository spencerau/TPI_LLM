embedding:
  model: qwen3-embedding
  dimension: 4096
  # ollama_host: 192.168.200.110
  # ollama_host: host.docker.internal
  ollama_host: ollama
  ollama_port: 11434
  timeout: 120
  keep_alive: 30m
  retry_attempts: 7
  retry_delay: 0
  rate_limit_delay: 0
  batch_size: 24

llm:
  primary_model: qwen3.5:35b
  # ollama_host: 192.168.200.110
  # ollama_host: host.docker.internal
  ollama_host: ollama
  ollama_port: 11434
  temperature: 0.1
  max_tokens: 25000
  num_ctx: 256000
  timeout: 300
  keep_alive: 30m
  system_prompt: |
    You are a helpful assistant specializing in employment resources for people with disabilities.
    You help answer questions about job applications, interviews, workplace accommodations,
    legal policies, and best practices for inclusive employment.
    Answer questions based on the provided context from TPI (Thompson Policy Institute of Disability) documents.
    If you don't have enough information to answer, say so clearly.
  # router_host: 192.168.200.110
  # router_host: host.docker.internal
  router_host: ollama-router
  router_port: 11434
  router_timeout: 210

reranker:
  model: "xitao/bge-reranker-v2-m3"
  batch_size: 32
  max_candidates_for_rerank: 30
  activation: sigmoid

query_router:
  router_model: "qwen3.5:9b"
  router_temperature: 0.1
  router_max_tokens: 500